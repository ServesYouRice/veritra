<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Veritra app icon">
  <defs>
    <linearGradient id="iconLinkL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="iconLinkR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#0284C7"/>
    </linearGradient>
    <mask id="iconUnderBottom">
      <rect x="-512" y="-512" width="2048" height="2048" fill="#fff"/>
      <circle cx="256" cy="356" r="27" fill="#000"/>
    </mask>
    <mask id="iconUnderTop">
      <rect x="-512" y="-512" width="2048" height="2048" fill="#fff"/>
      <circle cx="256" cy="284" r="27" fill="#000"/>
    </mask>
  </defs>
  <!-- Squircle background -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="#0B1220"/>
  <!-- Mark, scaled and optically centered -->
  <g transform="translate(256 256) scale(0.82) translate(-256 -238)">
    <g mask="url(#iconUnderBottom)">
      <rect x="126.5" y="93" width="90" height="290" rx="45" fill="none" stroke="url(#iconLinkL)" stroke-width="30"
            transform="rotate(-35 171.5 238)"/>
    </g>
    <g mask="url(#iconUnderTop)">
      <rect x="295.5" y="93" width="90" height="290" rx="45" fill="none" stroke="url(#iconLinkR)" stroke-width="30"
            transform="rotate(35 340.5 238)"/>
    </g>
  </g>
</svg>
