<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 220" width="860" height="220" role="img" aria-label="Veritra chain link wordmark">
  <defs>
    <linearGradient id="wmLinkL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="wmLinkR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#0284C7"/>
    </linearGradient>
    <mask id="wmTuckUnder">
      <rect x="-512" y="-512" width="2048" height="2048" fill="#fff"/>
      <rect x="295.5" y="93" width="90" height="290" rx="45" fill="none" stroke="#000" stroke-width="54"
            transform="rotate(35 340.5 238)"/>
    </mask>
  </defs>
  <g transform="translate(-28 -21) scale(0.55)">
    <g mask="url(#wmTuckUnder)">
      <rect x="126.5" y="93" width="90" height="290" rx="45" fill="none" stroke="url(#wmLinkL)" stroke-width="30"
            transform="rotate(-35 171.5 238)"/>
    </g>
    <rect x="295.5" y="93" width="90" height="290" rx="45" fill="none" stroke="url(#wmLinkR)" stroke-width="30"
          transform="rotate(35 340.5 238)"/>
  </g>
  <!-- Wordmark (system sans; replace with brand type later) -->
  <text x="240" y="145" font-family="ui-sans-serif, system-ui, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="104" font-weight="700" letter-spacing="2" fill="#F1F5F9">veritra</text>
</svg>
