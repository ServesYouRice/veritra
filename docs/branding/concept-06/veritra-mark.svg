<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Veritra chain link mark">
  <defs>
    <linearGradient id="linkL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="linkR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#0284C7"/>
    </linearGradient>
    <!-- Weave: each link breaks where it passes under the other -->
    <mask id="underBottom">
      <rect width="512" height="512" fill="#fff"/>
      <circle cx="256" cy="356" r="27" fill="#000"/>
    </mask>
    <mask id="underTop">
      <rect width="512" height="512" fill="#fff"/>
      <circle cx="256" cy="284" r="27" fill="#000"/>
    </mask>
  </defs>
  <!-- Left link: over at the top crossing, under at the bottom -->
  <g mask="url(#underBottom)">
    <rect x="126.5" y="93" width="90" height="290" rx="45" fill="none" stroke="url(#linkL)" stroke-width="30"
          transform="rotate(-35 171.5 238)"/>
  </g>
  <!-- Right link: over at the bottom crossing, under at the top -->
  <g mask="url(#underTop)">
    <rect x="295.5" y="93" width="90" height="290" rx="45" fill="none" stroke="url(#linkR)" stroke-width="30"
          transform="rotate(35 340.5 238)"/>
  </g>
</svg>
