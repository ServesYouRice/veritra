services:
  messenger:
    build:
      context: ..
      dockerfile: server/Dockerfile
    environment:
      PRIVATE_MESSENGER_ADDR: ":8080"
      PRIVATE_MESSENGER_DATA_DIR: /data
      PRIVATE_MESSENGER_TRUSTED_PROXIES: 172.28.250.0/24
    volumes:
      - messenger-data:/data
    ports:
      # Plain HTTP is bound to loopback only so it is never exposed to the
      # network without TLS. For production, run the `caddy` profile
      # (`docker compose --profile caddy up`) which terminates HTTPS on 80/443
      # and reverse-proxies to this service over the internal network.
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "/usr/local/bin/messenger-server", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    mem_limit: 1g
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - messenger-net

  caddy:
    image: caddy:2.11.4@sha256:af5fdcd76f2db5e4e974ee92f96ee8c0fc3edb55bd4ba5032547cbf3f65e486d
    profiles: ["caddy"]
    depends_on:
      - messenger
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    mem_limit: 512m
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - messenger-net

networks:
  messenger-net:
    ipam:
      config:
        - subnet: 172.28.250.0/24

volumes:
  messenger-data:
  caddy-data:
  caddy-config:
