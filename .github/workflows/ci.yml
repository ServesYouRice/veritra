name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.0"
      - run: go test ./...
        working-directory: server
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi
        working-directory: server
      - name: go vet
        run: go vet ./...
        working-directory: server

  crypto:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.90.0 --profile minimal --component rustfmt,clippy
          rustup default 1.90.0
      - run: cargo test
        working-directory: crypto/rust
      - run: cargo fmt --check && cargo clippy --all-targets -- -D warnings
        working-directory: crypto/rust

  mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          flutter-version: "3.44.0"
          cache: true
      - run: flutter pub get --enforce-lockfile
        working-directory: mobile
      - run: flutter test
        working-directory: mobile
      - run: flutter analyze
        working-directory: mobile
      - run: dart format --set-exit-if-changed .
        working-directory: mobile

  licenses:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: ./scripts/license-check.sh

  vulnerabilities:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.0"
          cache-dependency-path: server/go.sum
      - name: Scan Go dependencies
        working-directory: server
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
      - name: Install pinned Rust audit tool
        run: cargo install cargo-audit --version 0.21.2 --locked
      - name: Scan Rust dependencies
        working-directory: crypto/rust
        run: cargo audit
