<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Veritra Setup</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect x='126.5' y='93' width='90' height='290' rx='45' fill='none' stroke='%234F46E5' stroke-width='44' transform='rotate(-35 171.5 238)'/%3E%3Crect x='295.5' y='93' width='90' height='290' rx='45' fill='none' stroke='%230EA5E9' stroke-width='44' transform='rotate(35 340.5 238)'/%3E%3C/svg%3E">
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --bg: #f4f5fb;
        --surface: #ffffff;
        --border: #dcdff0;
        --text: #171b2e;
        --muted: #565d7a;
        --accent: #4f46e5;
        --accent-soft: #e0e7ff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1220;
          --surface: #151d31;
          --border: #29334d;
          --text: #eef1fa;
          --muted: #a6aec9;
          --accent: #818cf8;
          --accent-soft: #1e1b4b;
        }
      }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: var(--bg); color: var(--text); }
      main { width: min(560px, calc(100vw - 32px)); background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; box-shadow: 0 12px 28px rgb(20 38 44 / 10%); }
      .badge { display: inline-grid; place-items: center; width: 56px; height: 56px; border-radius: 50%; background: var(--accent-soft); margin-bottom: 16px; }
      .badge svg { width: 38px; height: 38px; }
      h1 { margin: 0 0 8px; font-size: 24px; letter-spacing: 0; }
      p { margin: 0 0 14px; color: var(--muted); line-height: 1.5; }
      p:last-child { margin-bottom: 0; }
      code { font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace; background: var(--accent-soft); color: var(--text); border-radius: 6px; padding: 1px 6px; font-size: 0.925em; }
    </style>
  </head>
  <body>
    <main>
      <div class="badge" aria-hidden="true">
        <!-- Veritra chain link mark: two interlocked links, one per party -->
        <svg viewBox="0 0 512 512" role="img" aria-label="Veritra">
          <defs>
            <mask id="underBottom">
              <rect width="512" height="512" fill="#fff"/>
              <circle cx="256" cy="356" r="27" fill="#000"/>
            </mask>
            <mask id="underTop">
              <rect width="512" height="512" fill="#fff"/>
              <circle cx="256" cy="284" r="27" fill="#000"/>
            </mask>
          </defs>
          <g mask="url(#underBottom)">
            <rect x="126.5" y="93" width="90" height="290" rx="45" fill="none" stroke="#4F46E5" stroke-width="34"
                  transform="rotate(-35 171.5 238)"/>
          </g>
          <g mask="url(#underTop)">
            <rect x="295.5" y="93" width="90" height="290" rx="45" fill="none" stroke="#0EA5E9" stroke-width="34"
                  transform="rotate(35 340.5 238)"/>
          </g>
        </svg>
      </div>
      <h1>Setup Requires A Crypto Client</h1>
      <p>The browser setup form is disabled because production setup must create a real device key package locally.</p>
      <p>Use a client that implements production crypto and call <code>POST /api/v1/setup/owner</code> with a real <code>device_key_package</code>.</p>
    </main>
  </body>
</html>
